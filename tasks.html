<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Global Kids - Задания</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a237e">

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-deep: #0d1b2a;
            --math-color: #4fc3f7;
            --russian-color: #ef5350;
            --literature-color: #ffb74d;
            --world-color: #81c784;
            --text-primary: #ffffff;
            --text-secondary: #b0bec5;
            --blur: blur(20px);
            --radius-card: 20px;
            --radius-btn: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #0d1b2a 50%, #1b5e20 100%);
            min-height: 100vh;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .glass-card {
            background: rgba(13, 27, 42, 0.85);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-radius: var(--radius-card);
            border: 1px solid rgba(79, 195, 247, 0.25);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), 0 0 25px rgba(79, 195, 247, 0.15);
            padding: 1.5rem;
            color: var(--text-primary);
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4fc3f7, #81c784);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            border: 2px solid #4fc3f7;
            box-shadow: 0 0 20px rgba(79, 195, 247, 0.3);
        }

        .user-info { flex: 1; margin-left: 0.8rem; }
        .user-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.2rem; }
        .user-level {
            font-size: 0.75rem;
            color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            display: inline-block;
        }

        .gloins-badge {
            background: linear-gradient(135deg, #ffb74d, #f57c00);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(255, 183, 77, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(255, 183, 77, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(255, 183, 77, 0.6); }
        }

        .level-switcher {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .level-btn {
            padding: 0.5rem 0.8rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.04);
            color: #90a4ae;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .level-btn:hover {
            background: rgba(79, 195, 247, 0.1);
            border-color: rgba(79, 195, 247, 0.3);
        }

        .level-btn.active {
            background: linear-gradient(135deg, #4fc3f7, #0288d1);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(79, 195, 247, 0.3);
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .subject-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .subject-card:hover { transform: translateY(-3px); }
        .subject-card.math { border-left: 4px solid var(--math-color); }
        .subject-card.russian { border-left: 4px solid var(--russian-color); }
        .subject-card.literature { border-left: 4px solid var(--literature-color); }
        .subject-card.world { border-left: 4px solid var(--world-color); }

        .subject-icon { font-size: 2rem; margin-bottom: 0.5rem; display: block; }
        .subject-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.3rem; }
        .subject-progress { font-size: 0.7rem; color: #90a4ae; margin-bottom: 0.5rem; }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
        .progress-fill.math { background: var(--math-color); }
        .progress-fill.russian { background: var(--russian-color); }
        .progress-fill.literature { background: var(--literature-color); }
        .progress-fill.world { background: var(--world-color); }

        .subject-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(129, 199, 132, 0.2);
            color: #81c784;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: #90a4ae;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        .task-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .task-card.completed {
            border-color: rgba(129, 199, 132, 0.3);
            background: rgba(129, 199, 132, 0.05);
            opacity: 0.8;
        }

        .task-card.completed::after {
            content: '✅';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.2rem;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .task-title { font-weight: 600; font-size: 0.95rem; flex: 1; padding-right: 2rem; }

        .task-reward {
            background: linear-gradient(135deg, #ffb74d, #f57c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .task-desc {
            color: #90a4ae;
            font-size: 0.8rem;
            margin-bottom: 0.8rem;
            line-height: 1.4;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }

        .btn-play {
            background: linear-gradient(135deg, #81c784, #388e3c);
            color: #fff;
            box-shadow: 0 4px 15px rgba(129, 199, 132, 0.3);
        }

        .btn-disabled {
            background: rgba(255,255,255,0.06);
            color: #666;
            cursor: not-allowed;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef5350, #c62828);
            color: white;
            width: 100%;
            padding: 0.85rem;
            border-radius: 14px;
            font-size: 1rem;
            margin-top: 1rem;
        }

        .game-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .game-content {
            background: linear-gradient(135deg, #1a237e, #0d1b2a);
            border-radius: 20px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            border: 2px solid rgba(79, 195, 247, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .game-question {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .game-options { display: grid; gap: 0.8rem; }

        .game-option {
            padding: 1rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 1rem;
        }

        .game-option:hover {
            background: rgba(79, 195, 247, 0.1);
            border-color: rgba(79, 195, 247, 0.3);
        }

        .game-option.correct {
            background: rgba(129, 199, 132, 0.2);
            border-color: #81c784;
            animation: correctPulse 0.5s;
        }

        .game-option.wrong {
            background: rgba(239, 83, 80, 0.2);
            border-color: #ef5350;
            animation: shake 0.5s;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .game-score {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 1rem 0;
            color: #ffb74d;
        }

        .hidden { display: none !important; }

        @media (max-width: 480px) {
            .subjects-grid { grid-template-columns: 1fr; }
            .level-switcher {
                justify-content: flex-start;
                overflow-x: auto;
                padding-bottom: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="container">
        <div class="glass-card">
            <div class="header">
                <div style="display: flex; align-items: center;">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <div class="user-info">
                        <div class="user-name" id="dashName">Загрузка...</div>
                        <div class="user-level" id="dashLevel">Уровень</div>
                    </div>
                </div>
                <div class="gloins-badge" id="dashGloins">🪙 0</div>
            </div>

            <div class="level-switcher" id="levelSwitcher">
                <button class="level-btn" data-level="kindergarten">🏫 Сад</button>
                <button class="level-btn" data-level="1">📚 1 класс</button>
                <button class="level-btn" data-level="2">📚 2 класс</button>
                <button class="level-btn" data-level="3">📚 3 класс</button>
                <button class="level-btn" data-level="4">📚 4 класс</button>
                <button class="level-btn" data-level="5">📚 5 класс</button>
            </div>

            <div id="subjectsView">
                <div class="subjects-grid" id="subjectsGrid"></div>
            </div>

            <div id="tasksView" class="hidden">
                <button class="back-btn" onclick="showSubjects()">← Назад к предметам</button>
                <div class="section-title" id="tasksTitle"></div>
                <div id="tasksList"></div>
            </div>

            <div id="gameView" class="hidden">
                <div class="game-content">
                    <div class="game-question" id="gameQuestion"></div>
                    <div class="game-options" id="gameOptions"></div>
                    <div class="game-score hidden" id="gameScore"></div>
                    <button class="btn btn-play" onclick="closeGame()" style="width:100%; margin-top:1rem;">Закрыть игру</button>
                </div>
            </div>

            <button class="btn btn-danger" onclick="logout()">🚪 Выйти</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA6GGJxAiao77U7_9mBUEjftmS_FnSWbIw",
            authDomain: "glob-data.firebaseapp.com",
            projectId: "glob-data",
            storageBucket: "glob-data.firebasestorage.app",
            messagingSenderId: "122757049174",
            appId: "1:122757049174:web:ebb425edd0e1a8ea9a44f7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        particlesJS('particles-js', {
            particles: {
                number: { value: 40, density: { enable: true, value_area: 800 } },
                color: { value: ['#4fc3f7', '#81c784', '#ffb74d'] },
                shape: { type: 'circle' },
                opacity: { value: 0.3, random: true },
                size: { value: 2, random: true },
                line_linked: { enable: true, distance: 150, color: '#4fc3f7', opacity: 0.1, width: 1 },
                move: { enable: true, speed: 1, direction: 'none', random: true, out_mode: 'out' }
            },
            interactivity: {
                detect_on: 'canvas',
                events: { onhover: { enable: true, mode: 'grab' } },
                modes: { grab: { distance: 140, line_linked: { opacity: 0.3 } } }
            },
            retina_detect: true
        });

        let currentChildData = null;
        let currentLevel = null;
        let completedTasks = [];
        let currentSubject = null;
        let currentGame = null;
        let gameScore = 0;
        let gameQuestionIndex = 0;
        let currentGameQuestions = [];

        const levelNames = {
            'kindergarten': 'Детский сад',
            '1': '1 класс', '2': '2 класс', '3': '3 класс', '4': '4 класс', '5': '5 класс'
        };

        const subjects = [
            { id: 'math', name: 'Математика', icon: '🔢', color: 'math' },
            { id: 'russian', name: 'Русский язык', icon: '📝', color: 'russian' },
            { id: 'literature', name: 'Литература', icon: '📚', color: 'literature' },
            { id: 'world', name: 'Окружающий мир', icon: '🌍', color: 'world' }
        ];

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // ==================== ГЕНЕРАТОРЫ ВОПРОСОВ ПО КЛАССАМ ====================
        
        // Детский сад - Счет предметов
        function generateCountObjects() {
            const objects = ['🍎', '🍊', '', '🍇', '🍓', '🍒', '', '', '🍌', '🍐'];
            const questions = [];
            for (let i = 0; i < 5; i++) {
                const count = randomInt(1, 10);
                const obj = objects[randomInt(0, objects.length - 1)];
                const wrongAnswers = new Set();
                while (wrongAnswers.size < 3) {
                    const wrong = count + randomInt(-3, 3);
                    if (wrong !== count && wrong > 0 && wrong <= 10) wrongAnswers.add(wrong);
                }
                const options = shuffleArray([count, ...wrongAnswers]);
                questions.push({
                    q: `Сколько здесь предметов? ${obj.repeat(count)}`,
                    options: options.map(String),
                    correct: options.indexOf(count)
                });
            }
            return questions;
        }

        // Детский сад - Фигуры
        function generateFindShapes() {
            const shapes = [
                { name: 'круг', emoji: '⚪', desc: 'круглый' },
                { name: 'квадрат', emoji: '🟫', desc: 'с четырьмя равными сторонами' },
                { name: 'треугольник', emoji: '🔺', desc: 'с тремя углами' },
                { name: 'прямоугольник', emoji: '📱', desc: 'вытянутый с четырьмя углами' },
                { name: 'овал', emoji: '🥚', desc: 'похожий на яйцо' },
            ];
            const questions = [];
            for (let i = 0; i < 5; i++) {
                const shape = shapes[randomInt(0, shapes.length - 1)];
                const others = shapes.filter(s => s.name !== shape.name);
                const wrongOptions = shuffleArray(others).slice(0, 3).map(s => s.name);
                const options = shuffleArray([shape.name, ...wrongOptions]);
                questions.push({
                    q: `Какая это фигура? ${shape.emoji} (${shape.desc})`,
                    options: options,
                    correct: options.indexOf(shape.name)
                });
            }
            return questions;
        }

        // Детский сад и 1 класс - Больше-меньше
        function generateCompareNumbers(maxNum = 20) {
            const questions = [];
            for (let i = 0; i < 5; i++) {
                const a = randomInt(1, maxNum);
                const b = randomInt(1, maxNum);
                let correctAnswer;
                if (a > b) correctAnswer = `${a} > ${b}`;
                else if (a < b) correctAnswer = `${a} < ${b}`;
                else correctAnswer = `${a} = ${b}`;
                
                const wrongAnswers = [
                    `${a} < ${b}`,
                    `${a} > ${b}`,
                    `${a} = ${b}`
                ].filter(ans => ans !== correctAnswer);
                
                const options = shuffleArray([correctAnswer, ...wrongAnswers.slice(0, 3)]);
                questions.push({
                    q: `Сравни числа: ${a} и ${b}. Какой знак поставить?`,
                    options: options,
                    correct: options.indexOf(correctAnswer)
                });
            }
            return questions;
        }

        // 1 класс - Сложение
        function generateAddition(maxNum) {
            const questions = [];
            for (let i = 0; i < 5; i++) {
                const a = randomInt(1, maxNum);
                const b = randomInt(1, maxNum);
                const correct = a + b;
                const wrongAnswers = new Set();
                while (wrongAnswers.size < 3) {
                    const wrong = correct + randomInt(-5, 5);
                    if (wrong !== correct && wrong > 0) wrongAnswers.add(wrong);
                }
                const options = shuffleArray([correct, ...wrongAnswers]);
                questions.push({
                    q: `Сколько будет ${a} + ${b}?`,
                    options: options.map(String),
                    correct: options.indexOf(correct)
                });
            }
            return questions;
        }

        // 1 класс - Вычитание
        function generateSubtraction(maxNum) {
            const questions = [];
            for (let i = 0; i < 5; i++) {
                const a = randomInt(Math.floor(maxNum/2), maxNum);
                const b = randomInt(1, a);
                const correct = a - b;
                const wrongAnswers = new Set();
                while (wrongAnswers.size < 3) {
                    const wrong = correct + randomInt(-3, 3);
                    if (wrong !== correct && wrong >= 0) wrongAnswers.add(wrong);
                }
                const options = shuffleArray([correct, ...wrongAnswers]);
                questions.push({
                    q: `Сколько будет ${a} - ${b}?`,
                    options: options.map(String),
                    correct: options.indexOf(correct)
                });
            }
            return questions;
        }

        // 1-2 класс - Числовой ряд
        function generateNumberLine() {
            const questions = [];
            for (let i = 0; i < 5; i++) {
                const start = randomInt(1, 50);
                const step = randomInt(1, 5);
                const sequence = [start, start + step, start + 2 * step, '?', start + 4 * step];
                const correct = start + 3 * step;
                const wrongAnswers = new Set();
                while (wrongAnswers.size < 3) {
                    const wrong = correct + randomInt(-10, 10);
                    if (wrong !== correct && wrong > 0) wrongAnswers.add(wrong);
                }
                const options = shuffleArray([correct, ...wrongAnswers]);
                questions.push({
                    q: `Продолжи ряд: ${sequence.join(', ')}`,
                    options: options.map(String),
                    correct: options.indexOf(correct)
                });
            }
            return questions;
        }

        // 2 класс - Умножение
        function generateMultiplication(maxA, maxB = 10) {
            const questions = [];
            for (let i = 0; i < 5; i++) {
                const a = randomInt(2, maxA);
                const b = randomInt(2, maxB);
                const correct = a * b;
                const wrongAnswers = new Set();
                while (wrongAnswers.size < 3) {
                    const wrong = correct + randomInt(-10, 10);
                    if (wrong !== correct && wrong > 0) wrongAnswers.add(wrong);
                }
                const options = shuffleArray([correct, ...wrongAnswers]);
                questions.push({
                    q: `Сколько будет ${a} × ${b}?`,
                    options: options.map(String),
                    correct: options.indexOf(correct)
                });
            }
            return questions;
        }

        // 2-3 класс - Время на часах
        function generateTellTime() {
            const questions = [];
            for (let i = 0; i < 5; i++) {
                const hours = randomInt(1, 12);
                const minutes = randomInt(0, 3) * 15;
                const timeStr = `${hours}:${minutes.toString().padStart(2, '0')}`;
                const wrongTimes = new Set();
                while (wrongTimes.size < 3) {
                    const wrongHour = randomInt(1, 12);
                    const wrongMin = randomInt(0, 3) * 15;
                    const wrongStr = `${wrongHour}:${wrongMin.toString().padStart(2, '0')}`;
                    if (wrongStr !== timeStr) wrongTimes.add(wrongStr);
                }
                const options = shuffleArray([timeStr, ...wrongTimes]);
                questions.push({

                const a = (randomInt(1, 100) / 10).toFixed(1);
                const b = (randomInt(1, 100) / 10).toFixed(1);
                let correctAnswer;

                const wrongAnswers = new Set();

                    q: `Вычисли: ${num1}/${denom} + ${num2}/${denom} = ?`,
                    options: options,
                    correct: options.indexOf(correctStr)
                });
            }

        // ==================== ОСНОВНЫЕ ФУНКЦИИ ====================

        async function loadChildData() {
            const childDataStr = sessionStorage.getItem('currentChild');
            if (!childDataStr) {
                window.location.href = 'index.html';
                return;
            }

            currentChildData = JSON.parse(childDataStr);
            
            const userDoc = await db.collection('globalkids').doc(currentChildData.globalId).get();
            if (!userDoc.exists) {
                alert('Аккаунт не найден');
                window.location.href = 'index.html';
                return;
            }

            const data = userDoc.data();
            completedTasks = data.completedTasks || [];
            currentLevel = data.level;

            document.getElementById('dashName').textContent = data.fullName;
            document.getElementById('dashLevel').textContent = levelNames[data.level] || data.level;
            document.getElementById('dashGloins').textContent = `🪙 ${data.gloins || 0}`;
            document.getElementById('userAvatar').textContent = data.fullName.charAt(0).toUpperCase();

            currentChildData = { ...data, globalId: currentChildData.globalId };
            
            updateLevelButtons();
            showSubjects();
        }

        function updateLevelButtons() {
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.level === currentLevel);
            });
        }

        document.getElementById('levelSwitcher').addEventListener('click', async (e) => {
            if (e.target.classList.contains('level-btn')) {
                const newLevel = e.target.dataset.level;
                if (newLevel !== currentLevel) {
                    currentLevel = newLevel;
                    updateLevelButtons();
                    
                    await db.collection('globalkids').doc(currentChildData.globalId).update({
                        level: currentLevel
                    });
                    
                    currentChildData.level = currentLevel;
                    document.getElementById('dashLevel').textContent = levelNames[currentLevel] || currentLevel;
                    
                    if (currentSubject) {
                        showSubjectTasks(currentSubject);
                    } else {
                        showSubjects();
                    }
                }
            }
        });

        function showSubjects() {
            currentSubject = null;
            document.getElementById('subjectsView').classList.remove('hidden');
            document.getElementById('tasksView').classList.add('hidden');
            document.getElementById('gameView').classList.add('hidden');

            const grid = document.getElementById('subjectsGrid');
            grid.innerHTML = subjects.map(subject => {
                const tasks = tasksDatabase[subject.id][currentLevel] || [];
                const completedCount = tasks.filter(t => completedTasks.includes(t.id)).length;
                const progressPercent = tasks.length > 0 ? (completedCount / tasks.length) * 100 : 0;
                const allCompleted = tasks.length > 0 && completedCount === tasks.length;

                return `
                    <div class="subject-card ${subject.color}" onclick="showSubjectTasks('${subject.id}')">
                        <span class="subject-icon">${subject.icon}</span>
                        <div class="subject-title">${subject.name}</div>
                        <div class="subject-progress">${completedCount}/${tasks.length} заданий</div>
                        <div class="progress-bar">
                            <div class="progress-fill ${subject.color}" style="width: ${progressPercent}%"></div>
                        </div>
                        ${allCompleted ? '<div class="subject-badge completed">✓ Все</div>' : ''}
                    </div>
                `;
            }).join('');
        }

        window.showSubjectTasks = (subjectId) => {
            currentSubject = subjectId;
            const subject = subjects.find(s => s.id === subjectId);
            const tasks = tasksDatabase[subjectId][currentLevel] || [];

            document.getElementById('subjectsView').classList.add('hidden');
            document.getElementById('tasksView').classList.remove('hidden');
            document.getElementById('gameView').classList.add('hidden');

            document.getElementById('tasksTitle').innerHTML = `${subject.icon} ${subject.name} - ${levelNames[currentLevel]}`;

            const tasksList = document.getElementById('tasksList');
            tasksList.innerHTML = tasks.map(task => {
                const isCompleted = completedTasks.includes(task.id);
                return `
                    <div class="task-card ${isCompleted ? 'completed' : ''}">
                        <div class="task-header">
                            <span class="task-title">${task.title}</span>
                            <span class="task-reward">🪙 +${task.reward}</span>
                        </div>
                        <div class="task-desc">${task.desc}</div>
                        <button class="btn ${isCompleted ? 'btn-disabled' : 'btn-play'}" 
                                onclick="${isCompleted ? '' : `startGame('${task.id}', '${task.game}', ${task.reward})`}"
                                ${isCompleted ? 'disabled' : ''}>
                            ${isCompleted ? '✅ Выполнено' : '🎮 Играть'}
                        </button>
                    </div>
                `;
            }).join('');
        };

        window.startGame = (taskId, gameType, reward) => {
            if (completedTasks.includes(taskId)) return;

            currentGame = { taskId, gameType, reward };
            gameScore = 0;
            gameQuestionIndex = 0;

            const generator = questionGenerators[gameType];
            if (generator) {
                currentGameQuestions = generator();
            } else {
                currentGameQuestions = generateAddition(10);
            }

            document.getElementById('gameView').classList.remove('hidden');
            document.getElementById('gameScore').classList.add('hidden');
            showGameQuestion();
        };

        function showGameQuestion() {
            if (gameQuestionIndex >= 5) {
                endGame();
                return;
            }

            const question = currentGameQuestions[gameQuestionIndex];
            document.getElementById('gameQuestion').textContent = `Вопрос ${gameQuestionIndex + 1}/5: ${question.q}`;
            
            const optionsDiv = document.getElementById('gameOptions');
            optionsDiv.innerHTML = question.options.map((opt, idx) => `
                <div class="game-option" onclick="checkAnswer(${idx}, ${question.correct})">
                    ${opt}
                </div>
            `).join('');
        }

        window.checkAnswer = (selected, correct) => {
            const options = document.querySelectorAll('.game-option');
            options.forEach((opt, idx) => {
                opt.style.pointerEvents = 'none';
                if (idx === correct) opt.classList.add('correct');
                if (idx === selected && idx !== correct) opt.classList.add('wrong');
            });

            if (selected === correct) {
                gameScore++;
                confetti({
                    particleCount: 50,
                    spread: 70,
                    origin: { y: 0.6 }
                });
            }

            setTimeout(() => {
                gameQuestionIndex++;
                showGameQuestion();
            }, 1500);
        };

        async function endGame() {
            document.getElementById('gameScore').classList.remove('hidden');
            document.getElementById('gameScore').textContent = `Результат: ${gameScore}/5`;
            document.getElementById('gameQuestion').textContent = gameScore >= 3 ? '🎉 Отличная работа!' : '📚 Попробуй ещё раз!';
            document.getElementById('gameOptions').innerHTML = '';

            if (gameScore >= 3) {
                await completeTask(currentGame.taskId, currentGame.reward);
            }
        }

        window.closeGame = () => {
            document.getElementById('gameView').classList.add('hidden');
            currentGame = null;
            if (currentSubject) {
                showSubjectTasks(currentSubject);
            } else {
                showSubjects();
            }
        };

        async function completeTask(taskId, reward) {
            if (completedTasks.includes(taskId)) return;

            completedTasks.push(taskId);
            const newGloins = (currentChildData.gloins || 0) + reward;

            await db.collection('globalkids').doc(currentChildData.globalId).update({
                completedTasks: completedTasks,
                gloins: newGloins
            });

            currentChildData.gloins = newGloins;
            currentChildData.completedTasks = completedTasks;
            
            document.getElementById('dashGloins').textContent = `🪙 ${newGloins}`;
            
            if (currentSubject) {
                showSubjectTasks(currentSubject);
            }
        }

        window.showSubjects = showSubjects;

        window.logout = async () => {
            if (auth.currentUser) {
                await auth.signOut();
            }
            sessionStorage.removeItem('currentChild');
            window.location.href = 'index.html';
        };

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'index.html';
            } else {
                loadChildData();
            }
        });
