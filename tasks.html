<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Global Kids - Задания</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a237e">

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-deep: #0d1b2a;
            --math-color: #4fc3f7;
            --russian-color: #ef5350;
            --literature-color: #ffb74d;
            --world-color: #81c784;
            --text-primary: #ffffff;
            --text-secondary: #b0bec5;
            --blur: blur(20px);
            --radius-card: 20px;
            --radius-btn: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #0d1b2a 50%, #1b5e20 100%);
            min-height: 100vh;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .glass-card {
            background: rgba(13, 27, 42, 0.85);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-radius: var(--radius-card);
            border: 1px solid rgba(79, 195, 247, 0.25);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), 0 0 25px rgba(79, 195, 247, 0.15);
            padding: 1.5rem;
            color: var(--text-primary);
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }

        /* Header Styles */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4fc3f7, #81c784);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            border: 2px solid #4fc3f7;
            box-shadow: 0 0 20px rgba(79, 195, 247, 0.3);
        }

        .user-info {
            flex: 1;
            margin-left: 0.8rem;
        }

        .user-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .user-level {
            font-size: 0.75rem;
            color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            display: inline-block;
        }

        .gloins-badge {
            background: linear-gradient(135deg, #ffb74d, #f57c00);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(255, 183, 77, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(255, 183, 77, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(255, 183, 77, 0.6); }
        }

        /* Level Switcher */
        .level-switcher {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .level-btn {
            padding: 0.5rem 0.8rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.04);
            color: #90a4ae;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .level-btn:hover {
            background: rgba(79, 195, 247, 0.1);
            border-color: rgba(79, 195, 247, 0.3);
        }

        .level-btn.active {
            background: linear-gradient(135deg, #4fc3f7, #0288d1);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(79, 195, 247, 0.3);
        }

        /* Subject Cards Grid */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .subject-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .subject-card:hover {
            transform: translateY(-3px);
        }

        .subject-card.math {
            border-left: 4px solid var(--math-color);
        }
        .subject-card.math:hover {
            box-shadow: 0 8px 25px rgba(79, 195, 247, 0.2);
            border-color: rgba(79, 195, 247, 0.3);
        }

        .subject-card.russian {
            border-left: 4px solid var(--russian-color);
        }
        .subject-card.russian:hover {
            box-shadow: 0 8px 25px rgba(239, 83, 80, 0.2);
            border-color: rgba(239, 83, 80, 0.3);
        }

        .subject-card.literature {
            border-left: 4px solid var(--literature-color);
        }
        .subject-card.literature:hover {
            box-shadow: 0 8px 25px rgba(255, 183, 77, 0.2);
            border-color: rgba(255, 183, 77, 0.3);
        }

        .subject-card.world {
            border-left: 4px solid var(--world-color);
        }
        .subject-card.world:hover {
            box-shadow: 0 8px 25px rgba(129, 199, 132, 0.2);
            border-color: rgba(129, 199, 132, 0.3);
        }

        .subject-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .subject-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }

        .subject-progress {
            font-size: 0.7rem;
            color: #90a4ae;
            margin-bottom: 0.5rem;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s;
        }

        .progress-fill.math { background: var(--math-color); }
        .progress-fill.russian { background: var(--russian-color); }
        .progress-fill.literature { background: var(--literature-color); }
        .progress-fill.world { background: var(--world-color); }

        .subject-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(129, 199, 132, 0.2);
            color: #81c784;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .subject-badge.completed {
            background: rgba(129, 199, 132, 0.3);
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(129, 199, 132, 0.3); }
            50% { box-shadow: 0 0 15px rgba(129, 199, 132, 0.6); }
        }

        /* Tasks List */
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: #90a4ae;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(79, 195, 247, 0.1);
            border-color: rgba(79, 195, 247, 0.3);
        }

        .task-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .task-card:hover {
            border-color: rgba(79, 195, 247, 0.2);
            background: rgba(255,255,255,0.06);
        }

        .task-card.completed {
            border-color: rgba(129, 199, 132, 0.3);
            background: rgba(129, 199, 132, 0.05);
            opacity: 0.8;
        }

        .task-card.completed::after {
            content: '✅';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.2rem;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .task-title {
            font-weight: 600;
            font-size: 0.95rem;
            flex: 1;
            padding-right: 2rem;
        }

        .task-reward {
            background: linear-gradient(135deg, #ffb74d, #f57c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .task-desc {
            color: #90a4ae;
            font-size: 0.8rem;
            margin-bottom: 0.8rem;
            line-height: 1.4;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }

        .btn-play {
            background: linear-gradient(135deg, #81c784, #388e3c);
            color: #fff;
            box-shadow: 0 4px 15px rgba(129, 199, 132, 0.3);
        }

        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(129, 199, 132, 0.5);
        }

        .btn-disabled {
            background: rgba(255,255,255,0.06);
            color: #666;
            cursor: not-allowed;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef5350, #c62828);
            color: white;
            width: 100%;
            padding: 0.85rem;
            border-radius: 14px;
            font-size: 1rem;
            margin-top: 1rem;
        }

        /* Game Modal */
        .game-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .game-content {
            background: linear-gradient(135deg, #1a237e, #0d1b2a);
            border-radius: 20px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            border: 2px solid rgba(79, 195, 247, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .game-question {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .game-options {
            display: grid;
            gap: 0.8rem;
        }

        .game-option {
            padding: 1rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 1rem;
        }

        .game-option:hover {
            background: rgba(79, 195, 247, 0.1);
            border-color: rgba(79, 195, 247, 0.3);
        }

        .game-option.correct {
            background: rgba(129, 199, 132, 0.2);
            border-color: #81c784;
            animation: correctPulse 0.5s;
        }

        .game-option.wrong {
            background: rgba(239, 83, 80, 0.2);
            border-color: #ef5350;
            animation: shake 0.5s;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .game-score {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 1rem 0;
            color: #ffb74d;
        }

        .hidden { display: none !important; }

        @media (max-width: 480px) {
            .subjects-grid {
                grid-template-columns: 1fr;
            }
            .level-switcher {
                justify-content: flex-start;
                overflow-x: auto;
                padding-bottom: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="container">
        <div class="glass-card">
            <!-- Header -->
            <div class="header">
                <div style="display: flex; align-items: center;">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <div class="user-info">
                        <div class="user-name" id="dashName">Загрузка...</div>
                        <div class="user-level" id="dashLevel">Уровень</div>
                    </div>
                </div>
                <div class="gloins-badge" id="dashGloins">🪙 0</div>
            </div>

            <!-- Level Switcher -->
            <div class="level-switcher" id="levelSwitcher">
                <button class="level-btn" data-level="kindergarten">🏫 Сад</button>
                <button class="level-btn" data-level="1">📚 1 класс</button>
                <button class="level-btn" data-level="2">📚 2 класс</button>
                <button class="level-btn" data-level="3">📚 3 класс</button>
                <button class="level-btn" data-level="4">📚 4 класс</button>
                <button class="level-btn" data-level="5">📚 5 класс</button>
            </div>

            <!-- Subjects Grid -->
            <div id="subjectsView">
                <div class="subjects-grid" id="subjectsGrid"></div>
            </div>

            <!-- Tasks View -->
            <div id="tasksView" class="hidden">
                <button class="back-btn" onclick="showSubjects()">← Назад к предметам</button>
                <div class="section-title" id="tasksTitle"></div>
                <div id="tasksList"></div>
            </div>

            <!-- Game View -->
            <div id="gameView" class="hidden">
                <div class="game-content">
                    <div class="game-question" id="gameQuestion"></div>
                    <div class="game-options" id="gameOptions"></div>
                    <div class="game-score hidden" id="gameScore"></div>
                    <button class="btn btn-play" onclick="closeGame()" style="width:100%; margin-top:1rem;">Закрыть игру</button>
                </div>
            </div>

            <button class="btn btn-danger" onclick="logout()">🚪 Выйти</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA6GGJxAiao77U7_9mBUEjftmS_FnSWbIw",
            authDomain: "glob-data.firebaseapp.com",
            projectId: "glob-data",
            storageBucket: "glob-data.firebasestorage.app",
            messagingSenderId: "122757049174",

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        particlesJS('particles-js', {
            particles: {
                number: { value: 40, density: { enable: true, value_area: 800 } },
                color: { value: ['#4fc3f7', '#81c784', '#ffb74d'] },
                shape: { type: 'circle' },
                opacity: { value: 0.3, random: true },
                size: { value: 2, random: true },
                line_linked: { enable: true, distance: 150, color: '#4fc3f7', opacity: 0.1, width: 1 },
                move: { enable: true, speed: 1, direction: 'none', random: true, out_mode: 'out' }
            },
            interactivity: {
                detect_on: 'canvas',
                events: { onhover: { enable: true, mode: 'grab' } },
                modes: { grab: { distance: 140, line_linked: { opacity: 0.3 } } }
            },
            retina_detect: true
        });

        let currentChildData = null;
        let currentLevel = null;
        let completedTasks = [];
        let currentSubject = null;

        const levelNames = {

            '1': '1 класс', '2': '2 класс', '3': '3 класс', '4': '4 класс', '5': '5 класс'

        const subjects = [

            { id: 'russian', name: 'Русский язык', icon: '📝', color: 'russian' },

        // Задания по предметам и уровням (по 3 карточки на предмет)

            world: {

                    { id: 'w_k3', title: '🌳 Растения', desc: 'Части растения', reward: 5, game: 'plant_parts' },
                ],
                1: [
                    { id: 'w1_1', title: '🌍 Природа', desc: 'Живая и неживая природа', reward: 8, game: 'nature' },
                    { id: 'w1_2', title: '🐦 Птицы', desc: 'Перелётные и зимующие птицы', reward: 8, game: 'birds' },
                    { id: 'w1_3', title: '🌡️ Погода', desc: 'Определи погодные явления', reward: 10, game: 'weather' },
                ],
                2: [
                    { id: 'w2_1', title: '🗺️ Ориентирование', desc: 'Стороны горизонта', reward: 12, game: 'compass' },
                    { id: 'w2_2', title: '🌊 Водоёмы', desc: 'Виды водоёмов', reward: 10, game: 'water_bodies' },
                    { id: 'w2_3', title: '🏔️ Формы земли', desc: 'Горы, равнины, холмы', reward: 12, game: 'landforms' },
                ],
                3: [
                    { id: 'w3_1', title: '🌍 Природные зоны', desc: 'Определи природную зону', reward: 15, game: 'natural_zones' },
                    { id: 'w3_2', title: '🦋 Цепи питания', desc: 'Составь пищевую цепочку', reward: 12, game: 'food_chain' },
                    { id: 'w3_3', title: '🗺️ Карта России', desc: 'Найди город на карте', reward: 15, game: 'russia_map' },
                ],
                4: [
                    { id: 'w4_1', title: '🏛️ История России', desc: 'Древняя Русь', reward: 15, game: 'ancient_rus' },
                    { id: 'w4_2', title: '🌿 Экосистемы', desc: 'Лес, луг, водоём', reward: 12, game: 'ecosystems' },
                    { id: 'w4_3', title: '🧭 Полезные ископаемые', desc: 'Определи минералы', reward: 15, game: 'minerals' },
                ],
                5: [
                    { id: 'w5_1', title: '🏛️ История', desc: 'Важные даты России', reward: 18, game: 'history_dates' },
                    { id: 'w5_2', title: '🔬 Наука', desc: 'Великие учёные', reward: 15, game: 'scientists' },
                    { id: 'w5_3', title: '🌍 Страны мира', desc: 'Столицы государств', reward: 18, game: 'world_capitals' },
                ]
            }
        };

        // Игровые вопросы (примеры)
        const gameQuestions = {
            addition_10: [
                { q: 'Сколько будет 3 + 5?', options: ['6', '7', '8', '9'], correct: 2 },
                { q: 'Сколько будет 2 + 6?', options: ['7', '8', '9', '10'], correct: 1 },
                { q: 'Сколько будет 4 + 4?', options: ['7', '8', '9', '10'], correct: 1 },
            ],
            vocabulary: [
                { q: 'Какая буква пропущена? М...локо', options: ['а', 'о', 'е', 'и'], correct: 1 },
                { q: 'Какая буква пропущена? С...бака', options: ['а', 'о', 'и', 'е'], correct: 1 },
                { q: 'Какая буква пропущена? В...рона', options: ['а', 'о', 'е', 'и'], correct: 1 },
            ],
            fairy_tale: [
                { q: 'Кто съел Колобка?', options: ['Заяц', 'Волк', 'Медведь', 'Лиса'], correct: 3 },
                { q: 'Кто тянул Репку?', options: ['Дед', 'Бабка', 'Внучка', 'Все вместе'], correct: 3 },
                { q: 'Кто разбил золотое яичко?', options: ['Дед', 'Баба', 'Мышка', 'Курочка'], correct: 2 },
            ],
            seasons: [
                { q: 'Когда опадают листья?', options: ['Весной', 'Летом', 'Осенью', 'Зимой'], correct: 2 },
                { q: 'Когда тает снег?', options: ['Зимой', 'Весной', 'Летом', 'Осенью'], correct: 1 },
                { q: 'Когда собирают урожай?', options: ['Весной', 'Летом', 'Осенью', 'Зимой'], correct: 2 },
            ],
        };

        let currentGame = null;
        let gameScore = 0;
        let gameQuestionIndex = 0;

        async function loadChildData() {
            const childDataStr = sessionStorage.getItem('currentChild');
            if (!childDataStr) {
                window.location.href = 'index.html';
                return;
            }

            currentChildData = JSON.parse(childDataStr);
            
            const userDoc = await db.collection('globalkids').doc(currentChildData.globalId).get();
            if (!userDoc.exists) {
                alert('Аккаунт не найден');
                window.location.href = 'index.html';
                return;
            }

            const data = userDoc.data();
            completedTasks = data.completedTasks || [];
            currentLevel = data.level;

            document.getElementById('dashName').textContent = data.fullName;
            document.getElementById('dashLevel').textContent = levelNames[data.level] || data.level;
            document.getElementById('dashGloins').textContent = `🪙 ${data.gloins || 0}`;
            document.getElementById('userAvatar').textContent = data.fullName.charAt(0).toUpperCase();

            currentChildData = { ...data, globalId: currentChildData.globalId };
            
            updateLevelButtons();
            showSubjects();
        }

        function updateLevelButtons() {
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.level === currentLevel);
            });
        }

        function showSubjects() {
            document.getElementById('subjectsView').classList.remove('hidden');
            document.getElementById('tasksView').classList.add('hidden');
            document.getElementById('gameView').classList.add('hidden');

            const grid = document.getElementById('subjectsGrid');
            grid.innerHTML = subjects.map(subject => {
                const tasks = tasksDatabase[subject.id][currentLevel] || [];
                const completedCount = tasks.filter(t => completedTasks.includes(t.id)).length;
                const progressPercent = tasks.length > 0 ? (completedCount / tasks.length) * 100 : 0;
                const allCompleted = tasks.length > 0 && completedCount === tasks.length;

                return `
                    <div class="subject-card ${subject.color}" onclick="showSubjectTasks('${subject.id}')">
                        <span class="subject-icon">${subject.icon}</span>
                        <div class="subject-title">${subject.name}</div>
                        <div class="subject-progress">${completedCount}/${tasks.length} заданий</div>
                        <div class="progress-bar">
                            <div class="progress-fill ${subject.color}" style="width: ${progressPercent}%"></div>
                        </div>
                        ${allCompleted ? '<div class="subject-badge completed">✓ Все</div>' : ''}
                    </div>
                `;
            }).join('');
        }

        function showSubjectTasks(subjectId) {
            currentSubject = subjectId;
            const subject = subjects.find(s => s.id === subjectId);
            const tasks = tasksDatabase[subjectId][currentLevel] || [];

            document.getElementById('subjectsView').classList.add('hidden');
            document.getElementById('tasksView').classList.remove('hidden');
            document.getElementById('gameView').classList.add('hidden');

            document.getElementById('tasksTitle').innerHTML = `${subject.icon} ${subject.name} - ${levelNames[currentLevel]}`;

            const tasksList = document.getElementById('tasksList');
            tasksList.innerHTML = tasks.map(task => {
                const isCompleted = completedTasks.includes(task.id);
                return `
                    <div class="task-card ${isCompleted ? 'completed' : ''}">
                        <div class="task-header">
                            <span class="task-title">${task.title}</span>
                            <span class="task-reward">🪙 +${task.reward}</span>
                        </div>
                        <div class="task-desc">${task.desc}</div>
                        <button class="btn ${isCompleted ? 'btn-disabled' : 'btn-play'}" 
                                onclick="${isCompleted ? '' : `startGame('${task.id}', '${task.game}', ${task.reward})`}"
                                ${isCompleted ? 'disabled' : ''}>
                            ${isCompleted ? '✅ Выполнено' : '🎮 Играть'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        window.startGame = (taskId, gameType, reward) => {
            if (completedTasks.includes(taskId)) return;

            currentGame = { taskId, gameType, reward };
            gameScore = 0;
            gameQuestionIndex = 0;

            const questions = gameQuestions[gameType] || [
                { q: 'Молодец! Ответь на вопрос:', options: ['Да', 'Нет', 'Не знаю', 'Может быть'], correct: 0 },
                { q: 'Отлично! Ещё вопрос:', options: ['Вариант 1', 'Вариант 2', 'Вариант 3', 'Вариант 4'], correct: 1 },
                { q: 'Супер! Последний вопрос:', options: ['A', 'B', 'C', 'D'], correct: 2 },
            ];

            document.getElementById('gameView').classList.remove('hidden');
            document.getElementById('gameScore').classList.add('hidden');
            showGameQuestion();
        };

        function showGameQuestion() {
            const questions = gameQuestions[currentGame.gameType] || gameQuestions.addition_10;
            
            if (gameQuestionIndex >= questions.length) {
                endGame();
                return;
            }

            const question = questions[gameQuestionIndex];
            document.getElementById('gameQuestion').textContent = `Вопрос ${gameQuestionIndex + 1}/3: ${question.q}`;
            
            const optionsDiv = document.getElementById('gameOptions');
            optionsDiv.innerHTML = question.options.map((opt, idx) => `
                <div class="game-option" onclick="checkAnswer(${idx}, ${question.correct})">
                    ${opt}
                </div>
            `).join('');
        }

        window.checkAnswer = (selected, correct) => {
            const options = document.querySelectorAll('.game-option');
            options.forEach((opt, idx) => {
                opt.style.pointerEvents = 'none';
                if (idx === correct) opt.classList.add('correct');
                if (idx === selected && idx !== correct) opt.classList.add('wrong');
            });

            if (selected === correct) {
                gameScore++;
                confetti({
                    particleCount: 50,
                    spread: 70,
                    origin: { y: 0.6 }
                });
            }

            setTimeout(() => {
                gameQuestionIndex++;
                showGameQuestion();
            }, 1500);
        };

        async function endGame() {
            document.getElementById('gameScore').classList.remove('hidden');
            document.getElementById('gameScore').textContent = `Результат: ${gameScore}/3`;
            document.getElementById('gameQuestion').textContent = gameScore >= 2 ? '🎉 Отличная работа!' : '📚 Попробуй ещё раз!';
            document.getElementById('gameOptions').innerHTML = '';

            if (gameScore >= 2) {
                await completeTask(currentGame.taskId, currentGame.reward);
            }
        }

        window.closeGame = () => {
            document.getElementById('gameView').classList.add('hidden');
            currentGame = null;
            if (currentSubject) {
                showSubjectTasks(currentSubject);
            } else {
                showSubjects();
            }
        };

        async function completeTask(taskId, reward) {
            if (completedTasks.includes(taskId)) return;

            completedTasks.push(taskId);
            const newGloins = (currentChildData.gloins || 0) + reward;

            await db.collection('globalkids').doc(currentChildData.globalId).update({
                completedTasks: completedTasks,
                gloins: newGloins
            });

            currentChildData.gloins = newGloins;
            currentChildData.completedTasks = completedTasks;
            
            document.getElementById('dashGloins').textContent = `🪙 ${newGloins}`;
            
            if (currentSubject) {
                showSubjectTasks(currentSubject);
            }
        }

        // Переключение уровней
        document.getElementById('levelSwitcher').addEventListener('click', (e) => {
            if (e.target.classList.contains('level-btn')) {
                currentLevel = e.target.dataset.level;
                updateLevelButtons();
                if (currentSubject) {
                    showSubjectTasks(currentSubject);
                } else {
                    showSubjects();
                }
            }
        });

        window.showSubjects = showSubjects;
        window.showSubjectTasks = showSubjectTasks;

        window.logout = async () => {
            if (auth.currentUser) {
                await auth.signOut();
            }
            sessionStorage.removeItem('currentChild');
            window.location.href = 'index.html';
        };

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'index.html';
            } else {
                loadChildData();
            }
        });
    </script>
